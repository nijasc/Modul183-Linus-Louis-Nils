spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  docker:
    compose:
      enabled: false

vaadin:
  productionMode: false

linkstack:
  security:
    rate-limit:
      login-max-attempts: 100
      login-window-seconds: 60
    cookies:
      secure: false
